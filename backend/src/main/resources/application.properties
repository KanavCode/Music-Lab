spring.application.name=MusicLab
server.port=8080

# ============================================================
# PostgreSQL DataSource (Supabase-hosted, accessed via Java JDBC)
# AJT Syllabus: Unit 4 — JDBC/JPA Compliance
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/musiclab}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Audio File Storage (Unit 2 — Java NIO)
# ============================================================
musiclab.storage.audio-dir=./storage/audio

# ============================================================
# Multipart Upload Configuration
# ============================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
