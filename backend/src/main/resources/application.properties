spring.application.name=MusicLab
server.port=8080

# ============================================================
# PostgreSQL DataSource (Supabase-hosted, accessed via Java JDBC)
# AJT Syllabus: Unit 4 — JDBC/JPA Compliance
# ============================================================
# Default points to your Supabase project; override via DB_URL for other environments.
spring.datasource.url=${DB_URL:jdbc:postgresql://db.certebkfbrihcmvtzcuw.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres}
# Keep DB password in environment only (do not commit secrets).
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Flyway Migration Configuration
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=true

# Legacy Java seeder is off by default; Flyway SQL migrations own DB initialization.
musiclab.legacy-seeder.enabled=false

# ============================================================
# Audio File Storage (Unit 2 — Java NIO)
# ============================================================
musiclab.storage.audio-dir=./storage/audio

# ============================================================
# Multipart Upload Configuration
# ============================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
